name: Deploy Reranker Edge Function
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-reranker.yml'
      - 'supabase/functions/reranker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy reranker function
        run: |
          supabase functions deploy reranker --project-ref xdkojaigrjhzjkqxguxh --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify function
        run: |
          curl -s -o /tmp/reranker_test.txt -w "HTTP %{http_code}" \
            -X POST "https://xdkojaigrjhzjkqxguxh.supabase.co/functions/v1/reranker" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"test payment","documents":[{"id":"1","content":"payment processing system"}]}'
          cat /tmp/reranker_test.txt
