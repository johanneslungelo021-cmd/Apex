# ============================================
# Security Regression Tests
# ============================================
# Runs on every push to digital-apex and main branches.
# Validates critical security patterns are present.
# ============================================

name: Security Regression Tests

on:
  push:
    branches: [main, digital-apex]
    paths:
      - 'src/**'
      - 'instrumentation.ts'
      - '.env.example'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
      - 'tests/**'
  pull_request:
    branches: [main, digital-apex]
    paths:
      - 'src/**'
      - 'instrumentation.ts'
      - '.env.example'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
      - 'tests/**'

permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: '20'

jobs:
  lint-and-types:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint -- --ignore-pattern 'skills/**'

  accessibility-check:
    name: V2 — No Nested Interactive Elements
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check for button inside anchor (a11y violation)
        run: |
          echo "Checking for nested interactive elements in page.tsx..."

          # Check for the problematic pattern: motion.a with nested button
          # Scope to full element (opening to closing tag) to avoid false positives from siblings
          if grep -Pzo '(?s)<motion\.a[^>]*>.*?</motion\.a>' src/app/page.tsx 2>/dev/null | grep -q '<button'; then
            echo "❌ FAIL: Found <button> nested inside <motion.a> — accessibility violation"
            exit 1
          fi

          # Also check for motion.a with onClick that has nested button
          if grep -Pzo '(?s)<motion\.a[^>]*onClick[^>]*>.*?</motion\.a>' src/app/page.tsx 2>/dev/null | grep -q '<button'; then
            echo "❌ FAIL: Found interactive elements nested inside <motion.a>"
            exit 1
          fi

          echo "✅ PASS: No nested interactive elements found"

  ssrf-ipv6-check:
    name: V6 — DNS Lookup Covers IPv6
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify dns.lookup with all address families
        run: |
          echo "Checking SSRF DNS resolution covers IPv6..."

          # Must use dns.lookup with { all: true }
          if ! grep -q "all: true" src/app/api/news/route.ts; then
            echo "❌ FAIL: dns.lookup({all: true}) not found in news/route.ts"
            exit 1
          fi

          # Must NOT use dns.resolve() which misses IPv6
          if grep -q 'dns\.resolve(' src/app/api/news/route.ts; then
            echo "❌ FAIL: dns.resolve() found — use dns.lookup({all:true}) instead"
            exit 1
          fi

          echo "✅ PASS: Full IPv4+IPv6 DNS resolution confirmed"

  redirect-protection:
    name: SSRF — Redirect Manual Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify redirect protection in fetch calls
        run: |
          echo "Checking redirect:'manual' on outbound fetches..."

          # news route must have redirect: 'manual' on OG image fetch
          if ! grep -q "redirect.*manual" src/app/api/news/route.ts; then
            echo "❌ FAIL: No redirect:'manual' in news/route.ts"
            exit 1
          fi

          echo "✅ PASS: Redirect protection confirmed"

  error-log-pii-check:
    name: V8 — No Raw Error Body in Logs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check for raw error body logging
        run: |
          echo "Checking that error bodies are not logged raw..."

          # Should NOT log errText in structured log calls
          if grep -n "log.*errText\|log.*error:.*errText" src/app/api/ai-agent/route.ts 2>/dev/null; then
            echo "❌ FAIL: Raw error text may be logged in ai-agent/route.ts"
            exit 1
          fi

          if grep -n "log.*errText\|log.*error:.*errText" src/app/api/news/route.ts 2>/dev/null; then
            echo "❌ FAIL: Raw error text may be logged in news/route.ts"
            exit 1
          fi

          echo "✅ PASS: No raw error body in log statements"

  payload-guard-check:
    name: V3 — Chunked Body Size Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify streaming body size enforcement
        run: |
          echo "Checking streamed request body enforcement..."

          # ai-agent route must stream-read body, not just check content-length
          if ! grep -q 'getReader\|reader.*read' src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: No streaming body reader in ai-agent/route.ts"
            exit 1
          fi

          # Must have PayloadTooLargeError or equivalent
          if ! grep -q 'PayloadTooLarge' src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: No PayloadTooLargeError in ai-agent/route.ts"
            exit 1
          fi

          echo "✅ PASS: Streamed body size guard confirmed"

  ip-hashing-check:
    name: V7 — HMAC IP Hashing Without Fallback
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify HMAC-based IP hashing
        run: |
          echo "Checking PII-safe IP logging..."

          # Must use createHmac, not createHash
          if ! grep -q 'createHmac' src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: IP hashing uses createHash instead of createHmac"
            exit 1
          fi

          # Must NOT have hardcoded salt fallback
          if grep -q "apex-ip-log-salt\|hardcoded.*salt\|default.*salt.*=" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: Hardcoded IP_LOG_SALT fallback detected"
            exit 1
          fi

          echo "✅ PASS: HMAC IP hashing without fallback confirmed"

  streaming-check:
    name: V9 — AI Agent Returns Streaming Response
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify streaming response
        run: |
          echo "Checking AI agent streaming..."

          # Must return a streaming Response, not NextResponse.json
          if grep -q "ReadableStream\|application/x-ndjson" src/app/api/ai-agent/route.ts; then
            echo "✅ PASS: Streaming response pattern found"
          else
            echo "❌ FAIL: No streaming response in ai-agent/route.ts"
            exit 1
          fi

  tiered-routing-check:
    name: NEW — Tiered Model Routing
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify tiered routing
        run: |
          echo "Checking tiered model routing..."

          # Must reference both 8B (simple) and 70B (complex) models
          if ! grep -q 'llama-3.1-8b-instant' src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: Simple tier model not found"
            exit 1
          fi

          if ! grep -q 'llama-3.3-70b-versatile' src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: Complex tier model not found"
            exit 1
          fi

          # Must have classification logic
          if ! grep -q 'classifyQuery\|classify\|tierConfig\|QueryTier' src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: No query classification logic found"
            exit 1
          fi

          echo "✅ PASS: Tiered routing confirmed"

  og-image-ssrf-check:
    name: V5 — OG Image URL Re-validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify resolved URLs are re-validated
        run: |
          echo "Checking OG:image URL re-validation..."

          # Must have resolveSafeImageUrl or equivalent re-validation
          if ! grep -q 'resolveSafeImageUrl\|assertSafeUrl.*absolute\|re-validat' src/app/api/news/route.ts; then
            echo "❌ FAIL: Resolved URLs are not re-validated for SSRF"
            exit 1
          fi

          echo "✅ PASS: OG image URL re-validation confirmed"

  behavioral-contracts:
    name: Behavioral Contracts Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run contract tests
        run: bun test tests/security-contracts.test.ts

  build-check:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - lint-and-types
      - accessibility-check
      - ssrf-ipv6-check
      - redirect-protection
      - error-log-pii-check
      - payload-guard-check
      - ip-hashing-check
      - streaming-check
      - tiered-routing-check
      - og-image-ssrf-check
      - behavioral-contracts
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: bun run build

  summary:
    name: Security Checks Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - lint-and-types
      - accessibility-check
      - ssrf-ipv6-check
      - redirect-protection
      - error-log-pii-check
      - payload-guard-check
      - ip-hashing-check
      - streaming-check
      - tiered-routing-check
      - og-image-ssrf-check
      - behavioral-contracts
      - build-check
    steps:
      - name: Evaluate all security checks
        run: |
          echo "══════════════════════════════════════════"
          echo "  Security Regression Tests Summary"
          echo "══════════════════════════════════════════"
          echo ""

          FAILED=0

          check_job() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "❌ FAIL: $name ($result)"
              FAILED=$((FAILED + 1))
            else
              echo "✅ PASS: $name"
            fi
          }

          check_job "Lint + Type Check"            "${{ needs.lint-and-types.result }}"
          check_job "V2 — Nested Interactive"       "${{ needs.accessibility-check.result }}"
          check_job "V3 — Chunked Body Guard"       "${{ needs.payload-guard-check.result }}"
          check_job "V5 — OG Image SSRF"            "${{ needs.og-image-ssrf-check.result }}"
          check_job "V6 — DNS IPv6 Coverage"        "${{ needs.ssrf-ipv6-check.result }}"
          check_job "V7 — HMAC IP Hashing"          "${{ needs.ip-hashing-check.result }}"
          check_job "V8 — No PII in Logs"           "${{ needs.error-log-pii-check.result }}"
          check_job "V9 — Streaming Response"       "${{ needs.streaming-check.result }}"
          check_job "SSRF — Redirect Manual"        "${{ needs.redirect-protection.result }}"
          check_job "Tiered Model Routing"          "${{ needs.tiered-routing-check.result }}"
          check_job "Behavioral Contracts"          "${{ needs.behavioral-contracts.result }}"
          check_job "Production Build"              "${{ needs.build-check.result }}"

          echo ""
          echo "══════════════════════════════════════════"

          if [ "$FAILED" -gt 0 ]; then
            echo "❌ $FAILED security check(s) FAILED"
            exit 1
          else
            echo "✅ All security regression tests passed!"
          fi
