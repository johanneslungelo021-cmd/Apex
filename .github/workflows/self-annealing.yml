name: Self-Annealing Meta-Agent
'on':
  workflow_run:
    workflows:
    - CI
    - Qwen Review Loop
    - Byzantine Consensus Gate
    types:
    - completed
    branches:
    - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  analyze-and-heal:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 5
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Collect failure context
      run: 'echo ''Failed workflow: ${{ github.event.workflow_run.name }}'' > /tmp/ctx.txt

        echo ''Run ID: ${{ github.event.workflow_run.id }}'' >> /tmp/ctx.txt

        git log --oneline -5 >> /tmp/ctx.txt

        git diff HEAD~1 --stat >> /tmp/ctx.txt

        git diff HEAD~1 -- ''*.ts'' ''*.yml'' | head -200 >> /tmp/ctx.txt

        '
    - name: DeepSeek V3.2 failure analysis
      id: analyze
      env:
        OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      run: python3 .github/scripts/ollama_deepseek_analyze.py
    - name: GLM-5 auto-fix
      if: steps.analyze.outputs.AUTO_FIXABLE == 'true'
      env:
        OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        GIT_AUTHOR_NAME: APEX Sentinel
        GIT_AUTHOR_EMAIL: sentinel@apex-vaal.ai
        GIT_COMMITTER_NAME: APEX Sentinel
        GIT_COMMITTER_EMAIL: sentinel@apex-vaal.ai
      run: |
        python3 .github/scripts/ollama_glm_fix.py
        SCRIPT=$(cat /tmp/glm_fix.sh)
        if [ "$SCRIPT" = 'SKIP' ] || [ -z "$SCRIPT" ]; then echo 'No auto-fix applied.'; exit 0; fi
        bash /tmp/glm_fix.sh
        git add -A
        if git diff --cached --quiet; then
          echo 'No changes.'
        else
          MSG=$(head -c 80 /tmp/root_cause.txt 2>/dev/null || echo 'sentinel auto-fix')
          git commit -m "fix(sentinel): auto-fix by GLM-5 - $MSG"
          git push origin main
        fi
    - name: T3 escalation comment
      if: steps.analyze.outputs.AUTO_FIXABLE == 'false'
      uses: actions/github-script@v7
      env:
        ROOT_CAUSE: ${{ steps.analyze.outputs.ROOT_CAUSE }}
        ESCALATE_REASON: ${{ steps.analyze.outputs.ESCALATE_REASON }}
        CONFIDENCE: ${{ steps.analyze.outputs.CONFIDENCE }}
        WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      with:
        script: await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:52,body:`## T3 Escalation - Human Review Required\n\n**Workflow:** \`${process.env.WORKFLOW_NAME}\`\n**Root
          cause:** ${process.env.ROOT_CAUSE}\n**Why human needed:** ${process.env.ESCALATE_REASON}\n**Confidence:** ${(parseFloat(process.env.CONFIDENCE||'0')*100).toFixed(0)}%\n\n*APEX Sentinel v3 - DeepSeek
          V3.2 - T3 HITL Required - @johanneslungelo021-cmd*`});
