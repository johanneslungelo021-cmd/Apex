name: Apply Migration 011 (one-time DDL)
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: MPP-config

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and push migrations
        run: |
          supabase link --project-ref xdkojaigrjhzjkqxguxh
          supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify columns
        run: |
          supabase db execute --sql "SELECT column_name, numeric_precision, numeric_scale FROM information_schema.columns WHERE table_name='transactions' AND column_name IN ('amount_zar','platform_fee_zar')"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
