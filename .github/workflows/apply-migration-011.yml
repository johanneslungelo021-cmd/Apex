name: Apply Migration 011 (one-time DDL)
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://xdkojaigrjhzjkqxguxh.supabase.co
    steps:
      - uses: actions/checkout@v4

      - name: Apply migration 011 via pg_dump SQL
        run: |
          # Apply DDL using the service role key
          cat supabase/migrations/011_amount_precision.sql
          echo "Migration file validated — apply manually via SQL Editor"
          echo "SQL Editor: https://supabase.com/dashboard/project/xdkojaigrjhzjkqxguxh/sql/new"
