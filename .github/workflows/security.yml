# ============================================
# Security Regression Tests
# ============================================
# Runs on every push to digital-apex and main branches.
# Validates critical security patterns are present.
# ============================================

name: Security Regression Tests

on:
  push:
    branches: [main, digital-apex]
  pull_request:
    branches: [main, digital-apex]

jobs:
  security-checks:
    name: Security Pattern Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ─────────────────────────────────────────────────────────────
      # SSRF Protection Checks
      # ─────────────────────────────────────────────────────────────
      - name: Check SSRF protection in news route
        run: |
          echo "Checking SSRF protection patterns..."

          # Must have dns.lookup for DNS resolution
          if ! grep -q "dns.lookup" src/app/api/news/route.ts; then
            echo "❌ FAIL: dns.lookup not found in news route"
            exit 1
          fi

          # Must have redirect: 'manual' to prevent redirect bypass
          if ! grep -q "redirect: 'manual'" src/app/api/news/route.ts; then
            echo "❌ FAIL: redirect: 'manual' not found in news route"
            exit 1
          fi

          # Must have PRIVATE_IP_PATTERNS
          if ! grep -q "PRIVATE_IP_PATTERNS" src/app/api/news/route.ts; then
            echo "❌ FAIL: PRIVATE_IP_PATTERNS not found in news route"
            exit 1
          fi

          # Must re-validate resolved URLs
          if ! grep -q "resolveSafeImageUrl" src/app/api/news/route.ts; then
            echo "❌ FAIL: resolveSafeImageUrl not found - resolved URLs not re-validated"
            exit 1
          fi

          echo "✅ SSRF protection patterns verified"

      # ─────────────────────────────────────────────────────────────
      # Body Size Limit Checks
      # ─────────────────────────────────────────────────────────────
      - name: Check body size limits in AI agent route
        run: |
          echo "Checking body size limit patterns..."

          # Must have MAX_REQUEST_BODY_BYTES constant
          if ! grep -q "MAX_REQUEST_BODY_BYTES" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: MAX_REQUEST_BODY_BYTES not defined in AI agent route"
            exit 1
          fi

          # Must have streaming body parser for chunked requests
          if ! grep -q "readJsonBodyWithinLimit" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: readJsonBodyWithinLimit not found - chunked body not protected"
            exit 1
          fi

          # Must have PayloadTooLargeError
          if ! grep -q "PayloadTooLargeError" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: PayloadTooLargeError not found"
            exit 1
          fi

          echo "✅ Body size limit patterns verified"

      # ─────────────────────────────────────────────────────────────
      # PII-Safe Logging Checks
      # ─────────────────────────────────────────────────────────────
      - name: Check PII-safe logging
        run: |
          echo "Checking PII-safe logging patterns..."

          # Must use HMAC for IP hashing (not plain hashing)
          if ! grep -q "createHmac" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: HMAC IP hashing not found in AI agent route"
            exit 1
          fi

          # Must not log raw error text from upstream
          if grep -q "error: errText" src/app/api/news/route.ts; then
            echo "❌ FAIL: Raw error text being logged in news route"
            exit 1
          fi

          # Should have IP_LOG_SALT reference
          if ! grep -q "IP_LOG_SALT" src/app/api/ai-agent/route.ts; then
            echo "⚠️  WARN: IP_LOG_SALT not referenced (IPs won't be hashed)"
          fi

          echo "✅ PII-safe logging patterns verified"

      # ─────────────────────────────────────────────────────────────
      # Message Validation Checks
      # ─────────────────────────────────────────────────────────────
      - name: Check message validation in AI agent
        run: |
          echo "Checking message validation patterns..."

          # Must validate message roles
          if ! grep -q "VALID_ROLES" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: VALID_ROLES not defined - message roles not validated"
            exit 1
          fi

          # Must have MAX_MESSAGES limit
          if ! grep -q "MAX_MESSAGES" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: MAX_MESSAGES not defined"
            exit 1
          fi

          # Must have MAX_CONTENT_LENGTH limit
          if ! grep -q "MAX_CONTENT_LENGTH" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: MAX_CONTENT_LENGTH not defined"
            exit 1
          fi

          # Must have aggregate payload guard
          if ! grep -q "MAX_TOTAL_PAYLOAD_BYTES" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: MAX_TOTAL_PAYLOAD_BYTES not defined - aggregate payload not guarded"
            exit 1
          fi

          echo "✅ Message validation patterns verified"

      # ─────────────────────────────────────────────────────────────
      # Rate Limiting Checks
      # ─────────────────────────────────────────────────────────────
      - name: Check rate limiting
        run: |
          echo "Checking rate limiting patterns..."

          # Must have rate limit check
          if ! grep -q "checkRateLimit" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: checkRateLimit not found in AI agent route"
            exit 1
          fi

          # Must return 429 on rate limit
          if ! grep -q "RATE_LIMITED" src/app/api/ai-agent/route.ts; then
            echo "❌ FAIL: RATE_LIMITED error not returned"
            exit 1
          fi

          echo "✅ Rate limiting patterns verified"

      # ─────────────────────────────────────────────────────────────
      # Environment Configuration Check
      # ─────────────────────────────────────────────────────────────
      - name: Check .env.example completeness
        run: |
          echo "Checking .env.example completeness..."

          # Must document all required secrets
          REQUIRED_VARS=("GROQ_API_KEY" "PERPLEXITY_API_KEY" "GRAFANA_API_KEY" "IP_LOG_SALT")

          for var in "${REQUIRED_VARS[@]}"; do
            if ! grep -q "$var" .env.example; then
              echo "❌ FAIL: $var not documented in .env.example"
              exit 1
            fi
          done

          echo "✅ .env.example completeness verified"

      - name: Security checks summary
        run: |
          echo "============================================"
          echo "✅ All security regression tests passed!"
          echo "============================================"
          echo ""
          echo "Validated:"
          echo "  - SSRF protection with DNS resolution"
          echo "  - SSRF redirect bypass prevention"
          echo "  - Resolved URL re-validation"
          echo "  - Chunked body size limits"
          echo "  - PII-safe IP logging with HMAC"
          echo "  - Redacted upstream error logging"
          echo "  - Message role validation"
          echo "  - Aggregate payload guards"
          echo "  - Rate limiting"
          echo "  - Environment documentation"

  lint-check:
    name: ESLint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint -- --ignore-pattern 'skills/**'
