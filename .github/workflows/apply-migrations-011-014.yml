name: Apply Migrations 011-014
on:
  push:
    branches: [MPP-config]
    paths:
      - '.github/workflows/apply-migrations-011-014.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: MPP-config

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push all migrations via DB URL
        run: |
          # Try linking with access token first
          supabase link --project-ref xdkojaigrjhzjkqxguxh || true
          
          # Try db push with direct URL using service role key as password
          DB_URL="postgresql://postgres.xdkojaigrjhzjkqxguxh:${SUPABASE_SERVICE_ROLE_KEY}@aws-0-eu-central-1.pooler.supabase.com:5432/postgres"
          supabase db push --include-all --db-url "$DB_URL" || \
          supabase db push --include-all --db-url "postgresql://postgres:${SUPABASE_SERVICE_ROLE_KEY}@db.xdkojaigrjhzjkqxguxh.supabase.co:5432/postgres" || \
          echo "Direct DB push failed, trying alternative..."
          
          # Fallback: use psql directly
          PGPASSWORD="${SUPABASE_SERVICE_ROLE_KEY}" psql "postgresql://postgres@db.xdkojaigrjhzjkqxguxh.supabase.co:5432/postgres" -f supabase/migrations/011_amount_precision.sql || true
          PGPASSWORD="${SUPABASE_SERVICE_ROLE_KEY}" psql "postgresql://postgres@db.xdkojaigrjhzjkqxguxh.supabase.co:5432/postgres" -f supabase/migrations/012_audit_graph.sql || true
          PGPASSWORD="${SUPABASE_SERVICE_ROLE_KEY}" psql "postgresql://postgres@db.xdkojaigrjhzjkqxguxh.supabase.co:5432/postgres" -f supabase/migrations/013_xrpl_precision_audit.sql || true
          PGPASSWORD="${SUPABASE_SERVICE_ROLE_KEY}" psql "postgresql://postgres@db.xdkojaigrjhzjkqxguxh.supabase.co:5432/postgres" -f supabase/migrations/014_rag_pipeline.sql || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Verify tables
        run: |
          # Use Supabase REST API to check tables exist
          for table in audit_graph_nodes audit_graph_edges ai_traces agent_memory warden_consensus payment_routes; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://xdkojaigrjhzjkqxguxh.supabase.co/rest/v1/${table}?select=*&limit=0" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}")
            echo "${table}: HTTP ${status}"
          done
