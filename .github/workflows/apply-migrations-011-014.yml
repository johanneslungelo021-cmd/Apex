name: Apply Migrations 011-014
on:
  push:
    branches: [MPP-config]
    paths:
      - '.github/workflows/apply-migrations-011-014.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: MPP-config

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref xdkojaigrjhzjkqxguxh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push all migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify new tables exist
        run: |
          supabase db execute --sql "SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('audit_graph_nodes','audit_graph_edges','ai_traces','agent_memory','warden_consensus','payment_routes') ORDER BY table_name"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
