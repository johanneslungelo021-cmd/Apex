name: Apply Migrations 011-014
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-migrations-011-014.yml'
      - 'supabase/migrations/*.sql'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and push all migrations
        run: |
          supabase link --project-ref xdkojaigrjhzjkqxguxh
          supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify tables via REST
        run: |
          for table in audit_graph_nodes audit_graph_edges ai_traces agent_memory warden_consensus payment_routes; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://xdkojaigrjhzjkqxguxh.supabase.co/rest/v1/${table}?select=*&limit=0" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}")
            echo "${table}: HTTP ${status}"
          done
