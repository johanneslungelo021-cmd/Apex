# Grafana Dashboard Provisioning Configuration
# Place this file in /etc/grafana/provisioning/dashboards/

apiVersion: 1

providers:
  - name: 'Apex Dashboards'
    orgId: 1
    folder: 'Apex'
    folderUid: 'apex-folder'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/apex
